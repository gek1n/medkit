name: medkit
description: "Family medication manager with AI"
publish_to: 'none'

version: 1.0.0+26

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  drift: ^2.23.1
  sqlcipher_flutter_libs: ^0.6.4
  sqlite3: ^2.4.6
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  cryptography: ^2.7.0
  path_provider: ^2.1.5
  path: ^1.9.1
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  speech_to_text: ^7.0.0
  http: ^1.2.2
  youtube_player_iframe: ^5.2.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.2.1
  timezone: ^0.10.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  in_app_review: ^2.0.9
  permission_handler: ^11.3.1
  archive: ^4.0.9
  google_sign_in: ^6.2.2
  icloud_storage: ^2.2.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  sign_in_with_apple: ^6.1.3
  audioplayers: ^6.1.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.2
  file_picker: 10.3.3
  in_app_purchase: ^3.2.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.1
  build_runner: ^2.4.15
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  path_provider_android: ^2.2.12
  # Vendored fork of file_picker 10.3.3 — upstream hardcodes Kotlin
  # jvmTarget=1.8 without a matching Java compileOptions block, which AGP 9
  # rejects as "Inconsistent JVM Target Compatibility Between Java and
  # Kotlin Tasks" (Java defaults to 11 there). Patched to declare Java 1.8
  # explicitly so both match. See third_party/file_picker/android/build.gradle.
  file_picker:
    path: third_party/file_picker

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/avatars/
    - assets/illustrations/
    - assets/audio/
    - assets/icon/

flutter_native_splash:
  color: "#F9EDE1"
  image: assets/illustrations/splash-logo.png
  android_12:
    color: "#F9EDE1"
    image: assets/illustrations/splash-icon-android12.png

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#F9EDE1"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
