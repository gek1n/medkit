name: medkit
description: "Family medication manager with AI"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  speech_to_text: ^7.0.0
  http: ^1.2.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.1
  build_runner: ^2.4.15

dependency_overrides:
  path_provider_android: ^2.2.12

flutter:
  uses-material-design: true
  generate: true
